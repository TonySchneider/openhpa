name: e2e

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "core/**"
      - "operator/**"
      - "e2e-tests/**"
      - "deploy/**"
      - "Dockerfile"
      - ".github/workflows/e2e.yml"

env:
  RUST_BACKTRACE: 1

jobs:
  kind-e2e:
    name: e2e on kind
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Create kind cluster
        uses: helm/kind-action@v1

      - name: Setup Rust (1.91.1)
        uses: dtolnay/rust-toolchain@1.91.1

      - uses: Swatinem/rust-cache@v2

      - name: Run e2e tests against kind
        # Single-threaded: the mutating passes list recommendations cluster-wide (Api::all), so
        # running tests in parallel against one shared cluster races across namespaces.
        run: cargo test -p e2e-tests -- --ignored --nocapture --test-threads=1

  # Boots the released artifact, not the source: builds the real image, installs the real chart,
  # and asserts the pod actually starts. Guards the class of failure where the image/chart combo
  # cannot start a pod at all (e.g. the v0.1.0 CreateContainerConfigError) that unit and in-process
  # e2e tests can never see.
  pod-smoke:
    name: pod-start smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Create kind cluster
        uses: helm/kind-action@v1

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: openhpa:smoke
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Load image into kind
        run: kind load docker-image openhpa:smoke --name chart-testing

      - name: Install chart
        run: |
          helm install openhpa deploy/helm/openhpa \
            --set image.repository=openhpa \
            --set image.tag=smoke \
            --set image.pullPolicy=Never \
            --set llm.provider=none

      - name: Wait for pod Ready (fail loud on waiting reasons)
        run: |
          sel="app.kubernetes.io/name=openhpa"
          bad='CreateContainerConfigError|CreateContainerError|ErrImagePull|ImagePullBackOff|ErrImageNeverPull|InvalidImageName|CrashLoopBackOff|RunContainerError'
          for _ in $(seq 1 36); do
            waiting=$(kubectl get pods -l "$sel" \
              -o jsonpath='{range .items[*].status.containerStatuses[*]}{.state.waiting.reason}{" "}{end}')
            if echo "$waiting" | grep -qE "$bad"; then
              echo "::error::operator pod stuck in waiting state: $waiting"
              kubectl describe pods -l "$sel"
              exit 1
            fi
            restarts=$(kubectl get pods -l "$sel" \
              -o jsonpath='{range .items[*].status.containerStatuses[*]}{.restartCount}{" "}{end}')
            if echo "$restarts" | grep -qE '[1-9]'; then
              echo "::error::operator container restarted (crash on start): restarts=$restarts"
              kubectl describe pods -l "$sel"
              kubectl logs -l "$sel" --previous --tail=100 || true
              exit 1
            fi
            ready=$(kubectl get pods -l "$sel" \
              -o jsonpath='{range .items[*].status.conditions[?(@.type=="Ready")]}{.status}{end}')
            if [ "$ready" = "True" ]; then
              exit 0
            fi
            sleep 5
          done
          echo "::error::operator pod did not become Ready within 180s"
          kubectl get pods -l "$sel" -o wide
          kubectl describe pods -l "$sel"
          exit 1

      - name: Assert operator startup log
        run: |
          sel="app.kubernetes.io/name=openhpa"
          pod=$(kubectl get pods -l "$sel" -o jsonpath='{.items[0].metadata.name}')
          for _ in $(seq 1 12); do
            if kubectl logs "$pod" | grep -F "openhpa operator starting"; then
              exit 0
            fi
            sleep 5
          done
          echo "::error::startup line not found in operator logs"
          kubectl logs "$pod" --tail=200
          exit 1
