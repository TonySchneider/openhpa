name: release

# Cuts a release on a semver tag: builds the operator image for linux/amd64 + linux/arm64 on
# native runners (Rust under QEMU is painfully slow), merges them into one multi-arch manifest,
# pushes it to GHCR, signs the manifest digest with cosign (keyless / OIDC — no long-lived keys),
# generates + attests an SPDX SBOM, and publishes the Helm chart as an OCI artifact. Anyone can
# verify the signature and SBOM attestation before pulling (works for air-gapped mirroring too).
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v0.1.0)"
        required: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build:
    name: build + push image (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Prepare platform pair
        run: |
          platform="${{ matrix.platform }}"
          echo "PLATFORM_PAIR=${platform//\//-}" >> "$GITHUB_ENV"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ env.PLATFORM_PAIR }}
          cache-to: type=gha,mode=max,scope=${{ env.PLATFORM_PAIR }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  image:
    name: merge manifest + sign
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
      id-token: write # cosign keyless signing via OIDC
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=tag

      - name: Create and push multi-arch manifest
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.IMAGE }}@sha256:%s ' *)

      - name: Assert both platforms in the pushed manifest
        run: |
          ref="${{ env.IMAGE }}:${{ steps.meta.outputs.version }}"
          platforms=$(docker manifest inspect "$ref" \
            | jq -r '.manifests[].platform | select(.os != "unknown") | "\(.os)/\(.architecture)"' | sort -u)
          echo "manifest platforms:"; echo "$platforms"
          for want in linux/amd64 linux/arm64; do
            if ! echo "$platforms" | grep -qx "$want"; then
              echo "::error::pushed manifest is missing $want"
              exit 1
            fi
          done

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign manifest digest (keyless)
        id: sign
        run: |
          digest=$(docker buildx imagetools inspect \
            "${{ env.IMAGE }}:${{ steps.meta.outputs.version }}" --format '{{json .Manifest}}' \
            | jq -r .digest)
          echo "digest=$digest" >> "$GITHUB_OUTPUT"
          cosign sign --yes "${IMAGE}@${digest}"

      - name: Generate SBOM (SPDX)
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.IMAGE }}@${{ steps.sign.outputs.digest }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Attest SBOM to the image (keyless)
        run: |
          cosign attest --yes --predicate sbom.spdx.json \
            --type spdxjson "${IMAGE}@${{ steps.sign.outputs.digest }}"

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-spdx
          path: sbom.spdx.json
          if-no-files-found: error

  chart:
    name: package + push Helm chart
    needs: image
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Log in to GHCR
        run: helm registry login ${{ env.REGISTRY }} -u ${{ github.actor }} --password ${{ secrets.GITHUB_TOKEN }}

      - name: Package and push chart
        run: |
          helm package deploy/helm/openhpa -d dist/
          helm push dist/*.tgz oci://${{ env.REGISTRY }}/${{ github.repository_owner }}/charts

      - name: Install oras
        uses: oras-project/setup-oras@v1

      - name: Publish Artifact Hub repository metadata
        # Tags the chart's OCI repo with `:artifacthub.io` so Artifact Hub can read the publisher
        # metadata (verified-publisher + ownership). Per Artifact Hub's OCI convention.
        working-directory: deploy/helm/openhpa
        run: |
          oras login ${{ env.REGISTRY }} -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}
          oras push \
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/charts/openhpa:artifacthub.io \
            --config /dev/null:application/vnd.cncf.artifacthub.config.v1+yaml \
            artifacthub-repo.yml:application/vnd.cncf.artifacthub.repository-metadata.layer.v1.yaml
